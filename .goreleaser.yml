version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: tsopencode
    main: .
    binary: tsopencode
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - "-s -w"
      - "-X main.Version={{.Version}}"

archives:
  - id: tsopencode
    name_template: "{{ .Binary }}-{{ .Tag }}-{{ .Os }}-{{ .Arch }}"
    files:
      - LICENSE
      - README.md

release:
  header: |
    ## Installation

    ### Homebrew
    ```bash
    brew install rajsinghtech/tap/tsopencode
    ```

    ### Binary
    Download the binary for your platform from the assets below.

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

homebrew_casks:
  - name: tsopencode
    ids:
      - tsopencode
    repository:
      owner: rajsinghtech
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    commit_author:
      name: Raj Singh
      email: rajsinghcpre@gmail.com
    homepage: "https://github.com/rajsinghtech/tsopencode"
    description: "opencode on your Tailscale tailnet via tsnet — no system tailscaled required"
    custom_block: |
      service do
        run opt_bin/"tsopencode"
        keep_alive true
        log_path var/"log/tsopencode.log"
        error_log_path var/"log/tsopencode.log"
        environment_variables PATH: std_service_path_env
      end
    caveats: |
      First-time setup — authenticate your Tailscale node by running once:
        TS_AUTHKEY=tskey-auth-... tsopencode
      State persists to ~/.config/tsopencode/ — subsequent runs are headless.

      To run as a background service (starts at login):
        brew services start tsopencode
